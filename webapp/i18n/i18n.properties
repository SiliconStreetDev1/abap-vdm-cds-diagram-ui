# =======================================================
# --- INFO POPOVERS (EXPLANATIONS) ---
# =======================================================
infoTitleCdsName=CDS View Name Requirements
infoTextCdsName=Please enter the exact technical name of the CDS View. Automated search and value-help are currently unavailable, so the name must be precise. For your convenience, previously entered views are stored in dropdown.

infoTitleEngine=Rendering Engine Explained
infoTextEngine=PlantUML is best for standard UML exports.Mermaid is great for clean, simple diagrams. Graphviz handles massive, complex data webs without crashing. 

infoTitleLevels=Levels Explained
infoTextLevels=Controls how deep the crawler goes. Level 1 shows the view you added. Level 2 shows relationships of that view. Level 3 shows relationships of those relationships, and so on. Be careful with high levels on complex views!

infoTitleShowKeys=Show Keys Explained
infoTextShowKeys=Displays the primary key fields of the CDS views inside the diagram boxes.

infoTitleShowFields=Show All Fields Explained
infoTextShowFields=Displays every non keyfield available in the CDS view. Warning: This can make the diagram incredibly large.Key fields visibility is not controlled by this toggle. See Show Keys.

infoTitleShowAssocFields=Show Association Fields
infoTextShowAssocFields=Displays the association fields of the CDS views inside the diagram boxes.Also if enabled relationship lines will be drawn from them if requested.

infoTitleShowBase=Show Base Data Source
infoTextShowBase=Includes the underlying database tables or base CDS views that this view selects its data from.

infoTitleCustomOnly=Custom Dev Only
infoTextCustomOnly=Filters the diagram to only show custom-built entities (those starting with Z or Y). Standard SAP entities are hidden.

infoTitleRelMode=Relationship Mode
infoTextRelMode=Lines physically draw connections on the canvas. Discovery fetches the related entities into the diagram payload without drawing connecting lines, keeping large webs clean.

infoTitleInclude=Include Entities
infoTextInclude=Only the exact CDS views listed here will be processed. All others will be ignored.

infoTitleExclude=Exclude Entities
infoTextExclude=The exact CDS views listed here will be forcibly removed and hidden from the diagram.